<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dhruv ❤️ Swapna</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff6a88, #ff99ac);
    overflow: hidden;
    color: white;
    text-align: center;
}

h1 {
    font-size: 2.5rem;
    min-height: 60px;
}

.buttons {
    margin-top: 30px;
    position: relative;
    width: 300px;
    height: 200px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    position: absolute;
}

.yes {
    background: #28a745;
    left: 40px;
}

.no {
    background: #dc3545;
    right: 40px;
}

.heart {
    position: absolute;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity:1; }
    100% { transform: translateY(-10vh); opacity:0; }
}
</style>
</head>

<body>

<h1 id="text"></h1>

<div class="buttons">
    <button class="yes" onclick="goYes()">Yes 💖</button>
    <button class="no" id="noBtn">No 😢</button>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// ❤️ HER NAME ADDED
const herName = "Swapna 💕";

const messages = [
    `Hey ${herName}… 🥺`,
    "I have something to tell you...",
    "You make my life beautiful ✨",
    "I really really like you 💕",
    `Swapna, will you be mine forever? 💖`
];

let m = 0, i = 0;

function typeEffect() {
    if (i < messages[m].length) {
        document.getElementById("text").innerHTML += messages[m].charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    } else {
        setTimeout(() => {
            document.getElementById("text").innerHTML = "";
            i = 0;
            m = (m + 1) % messages.length;
            typeEffect();
        }, 1500);
    }
}
typeEffect();

// 😈 NO button logic
const noBtn = document.getElementById("noBtn");
let scale = 1;

noBtn.addEventListener("mouseover", () => {
    scale -= 0.1;
    noBtn.style.transform = `scale(${scale})`;
    noBtn.style.left = Math.random() * 250 + "px";
    noBtn.style.top = Math.random() * 150 + "px";
});

// hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);

// music
document.body.addEventListener("click", () => {
    document.getElementById("music").play();
}, { once: true });

function goYes() {
    window.location.href = "yes.html";
}
</script>

</body>
</html>
